# This file is intentionally comments only. Do not commit GitHub App credentials
# or personal access tokens (PATs) to this repository.
#
# GitHub App authentication (recommended):
# 1. Create and install a GitHub App for boxp/arch.
# 2. Create the Secret with the App ID, installation ID, and private key:
# kubectl create secret generic arc-github-secret \
#   --namespace arc-runners \
#   --from-literal=github_app_id='<GitHub App ID>' \
#   --from-literal=github_app_installation_id='<GitHub App installation ID>' \
#   --from-file=github_app_private_key='<path to GitHub App private key.pem>'
#
# PAT authentication (alternative):
# 1. Create a PAT that can manage self-hosted runners for boxp/arch.
# 2. Create the Secret with the token:
# kubectl create secret generic arc-github-secret \
#   --namespace arc-runners \
#   --from-literal=github_token='<GitHub PAT>'
