name: Test Codex Novel Board Runner

on:
  pull_request:
    paths:
      - docker/codex-workspace/Dockerfile
      - docker/codex-workspace/entrypoint.sh
      - docker/codex-workspace/novel-board/**
      - tests/codex-workspace/novel-board-runner-test.sh
      - .github/workflows/test-codex-novel-board-runner.yml
  push:
    branches: [main]
    paths:
      - docker/codex-workspace/Dockerfile
      - docker/codex-workspace/entrypoint.sh
      - docker/codex-workspace/novel-board/**
      - tests/codex-workspace/novel-board-runner-test.sh
      - .github/workflows/test-codex-novel-board-runner.yml
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BABASHKA_VERSION: 1.12.218
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Babashka
        run: |
          set -eux
          tmp="$(mktemp -d)"
          curl --retry 5 --retry-all-errors --connect-timeout 30 --max-time 300 -fsSL \
            "https://github.com/babashka/babashka/releases/download/v${BABASHKA_VERSION}/babashka-${BABASHKA_VERSION}-linux-amd64-static.tar.gz" \
            -o "${tmp}/bb.tar.gz"
          tar -xzf "${tmp}/bb.tar.gz" -C "${tmp}"
          sudo install -m 0755 "$(find "${tmp}" -type f -name bb | head -n 1)" /usr/local/bin/bb
      - run: tests/codex-workspace/novel-board-runner-test.sh
