name: Test Ansible

on:
  workflow_call:
    inputs:
      ref:
        description: The ref to checkout
        type: string
        default: ${{ github.ref }}

jobs:
  detect-roles:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@48d8f15b2aaa3d255ca5af3eba4870f807ce6b3c # v45
        with:
          files: ansible/roles/**

      - name: Set matrix
        id: set-matrix
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"

          ROLES=()
          if [ -n "$CHANGED_FILES" ]; then
            while IFS= read -r role; do
              [ -n "$role" ] && ROLES+=("$role")
            done < <(echo "$CHANGED_FILES" | tr ' ' '\n' | grep "^ansible/roles/" | sed 's|^ansible/roles/||' | cut -d'/' -f1 | sort -u)
          fi

          echo "Changed roles: ${ROLES[*]}"

          if [ ${#ROLES[@]} -gt 0 ]; then
            MATRIX=$(printf '%s\n' "${ROLES[@]}" | jq -R . | jq -sc .)
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        run: |
          cd "ansible"
          uv sync

      - name: Run ansible-lint
        run: |
          cd "ansible"
          source .venv/bin/activate
          ansible-lint

  test:
    needs: [detect-roles, lint]
    if: needs.detect-roles.outputs.has-changes == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      MOLECULE_DOCKER_PLATFORM: linux/arm64
    strategy:
      matrix:
        role: ${{ fromJSON(needs.detect-roles.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        run: |
          cd "ansible"
          uv sync

      - name: Run Molecule test for ${{ matrix.role }}
        run: |
          cd "ansible"
          source .venv/bin/activate
          role_path="roles/${{ matrix.role }}"
          if [ -d "$role_path/molecule" ]; then
            echo "Testing role: $role_path"
            cd "$role_path"
            molecule test
          else
            echo "No molecule tests found for role: $role_path, skipping"
          fi
