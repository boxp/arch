name: Plan Ansible

on:
  pull_request:
    branches: [main]
    paths:
      - 'ansible/**'
      - '.github/workflows/plan-ansible.yml'
      - '.github/workflows/apply-ansible.yml'

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        node: [shanghai-1, shanghai-2, shanghai-3, golyat-4]
      fail-fast: false
    env:
      NODE_IPS: '{"shanghai-1":"192.168.10.102","shanghai-2":"192.168.10.103","shanghai-3":"192.168.10.104","golyat-4":"192.168.10.107"}'
      AQUA_POLICY_CONFIG: ${{ github.workspace }}/aqua/aqua-policy.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::839695154978:role/GitHubActions_Ansible_Plan
          aws-region: ap-northeast-1

      - name: Setup Cloudflare credentials
        id: cf-credentials
        run: |
          CF_ID=""
          for i in 1 2 3; do
            CF_ID=$(aws ssm get-parameter --name "bastion-cf-access-client-id" --with-decryption --query "Parameter.Value" --output text) && break
            echo "Retry $i: Failed to get CF_ACCESS_CLIENT_ID"
            sleep 5
          done
          if [ -z "$CF_ID" ]; then
            echo "::error::Failed to retrieve CF_ACCESS_CLIENT_ID after 3 attempts"
            exit 1
          fi

          CF_SECRET=""
          for i in 1 2 3; do
            CF_SECRET=$(aws ssm get-parameter --name "bastion-cf-access-client-secret" --with-decryption --query "Parameter.Value" --output text) && break
            echo "Retry $i: Failed to get CF_ACCESS_CLIENT_SECRET"
            sleep 5
          done
          if [ -z "$CF_SECRET" ]; then
            echo "::error::Failed to retrieve CF_ACCESS_CLIENT_SECRET after 3 attempts"
            exit 1
          fi

          echo "::add-mask::$CF_ID"
          echo "::add-mask::$CF_SECRET"

          echo "CF_ACCESS_CLIENT_ID=$CF_ID" >> "$GITHUB_ENV"
          echo "CF_ACCESS_CLIENT_SECRET=$CF_SECRET" >> "$GITHUB_ENV"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.2
          working_directory: aqua

      - name: Setup SSH config
        run: |
          NODE_IP=$(echo '${{ env.NODE_IPS }}' | jq -r '."${{ matrix.node }}"')

          cat >> ~/.ssh/config << EOF
          Host bastion
            HostName bastion.b0xp.io
            User ansible
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h --header "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
            StrictHostKeyChecking accept-new

          Host ${NODE_IP}
            HostName ${NODE_IP}
            User boxp
            IdentityFile ~/.ssh/id_ed25519
            ProxyJump bastion
            StrictHostKeyChecking accept-new
          EOF

          chmod 600 ~/.ssh/config

      - name: Verify SSH connectivity
        id: ssh-connectivity
        continue-on-error: true
        run: |
          NODE_IP=$(echo '${{ env.NODE_IPS }}' | jq -r '."${{ matrix.node }}"')
          echo "Testing SSH connectivity to ${{ matrix.node }} (${NODE_IP}) via bastion..."
          ssh -o ConnectTimeout=60 "${NODE_IP}" "echo 'SSH connection successful to ${{ matrix.node }}'"

      - name: Skip plan for unreachable node
        if: steps.ssh-connectivity.outcome != 'success'
        run: |
          echo "::warning::Skipping Ansible plan for ${{ matrix.node }} because SSH connectivity failed."
          mkdir -p ansible/plan_outputs
          jq -n \
            --arg node "${{ matrix.node }}" \
            '{
              node: $node,
              playbook: "ssh-connectivity",
              has_changes: false,
              stats: {
                ($node): {
                  ok: 0,
                  changed: 0,
                  skipped: 1,
                  failures: 0,
                  unreachable: 1
                }
              },
              changed_tasks: [],
              failed_tasks: []
            }' > "ansible/plan_outputs/${{ matrix.node }}-ssh-connectivity.fmt.json"

      - name: Set up Python
        if: steps.ssh-connectivity.outcome == 'success'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install uv
        if: steps.ssh-connectivity.outcome == 'success'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        if: steps.ssh-connectivity.outcome == 'success'
        run: |
          cd ansible
          uv sync

      - name: Run Ansible Plan (check + diff)
        if: steps.ssh-connectivity.outcome == 'success'
        id: ansible-plan
        run: |
          cd ansible
          source .venv/bin/activate
          NODE="${{ matrix.node }}"
          mkdir -p plan_outputs

          # Disable profile_tasks callback for this run only to get clean JSON stdout
          sed -i 's/^callbacks_enabled.*/#&/' ansible.cfg

          run_ansible() {
            local playbook="$1"
            local node="$2"
            local playbook_name="$3"
            local output_file="$4"
            shift 4
            local json_file="plan_outputs/${node}-${playbook_name}.json"

            set +e
            ANSIBLE_STDOUT_CALLBACK=json \
            ansible-playbook \
              -i inventories/production/hosts.yml \
              "$playbook" \
              --limit "$node" \
              -e "ansible_ssh_common_args=''" \
              -e "node_name=$node" \
              "$@" \
              --check --diff \
              > "$json_file" \
              2>"plan_outputs/${node}-${playbook_name}.stderr"
            local ansible_exit=$?
            set -e

            if [ "$ansible_exit" -ne 0 ] && [ "$ansible_exit" -ne 2 ]; then
              echo "::error::Ansible playbook $playbook failed with exit code $ansible_exit"
              return "$ansible_exit"
            fi

            echo "::group::Ansible JSON output for ${playbook_name} on ${node}"
            cat "$json_file"
            echo "::endgroup::"

            set +e
            ansible-plan-formatter --node "$node" --playbook "$playbook_name" \
              < "$json_file" > "$output_file"
            local fmt_exit=$?
            set -e
            # exit 0=no changes, 2=changes detected, 1=tool error
            if [ "$fmt_exit" -eq 1 ]; then
              echo "::error::ansible-plan-formatter failed for $playbook_name on $node"
              return 1
            fi
            return 0
          }

          if [[ "$NODE" == shanghai-* ]]; then
            run_ansible "playbooks/control-plane.yml" "$NODE" "control-plane" \
              "plan_outputs/${NODE}-control-plane.fmt.json"
          elif [[ "$NODE" == golyat-* ]]; then
            run_ansible "playbooks/worker-image.yml" "$NODE" "worker-image" \
              "plan_outputs/${NODE}-worker-image.fmt.json" \
              -e "worker_configure_static_network=true" \
              -e "worker_static_network_interface=enp44s0"
          else
            echo "::error::Unsupported Ansible target node: $NODE"
            exit 1
          fi

          PLAYBOOK="playbooks/node-${NODE}.yml"
          if [ -f "$PLAYBOOK" ]; then
            run_ansible "$PLAYBOOK" "$NODE" "node-${NODE}" \
              "plan_outputs/${NODE}-node-specific.fmt.json"
          fi

      - name: Upload plan output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: plan-${{ matrix.node }}
          path: ansible/plan_outputs/
          retention-days: 1

  comment:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.2
          working_directory: aqua

      - name: Download all plan outputs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: plan_outputs
          pattern: plan-*
          merge-multiple: true

      - name: Combine plan outputs
        id: combine
        run: |
          jq -s '.' plan_outputs/*.fmt.json > plan_combined.json
          HAS_CHANGES=$(jq 'any(.[]; .has_changes)' plan_combined.json)
          echo "has_changes=${HAS_CHANGES}" >> "$GITHUB_OUTPUT"

      - name: Hide old comments
        run: github-comment hide --config .github-comment-ansible.yaml -k ansible-plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post comment
        run: |
          github-comment post --config .github-comment-ansible.yaml -k ansible-plan \
            -var "has_changes:${{ steps.combine.outputs.has_changes }}" \
            -var-file "plans_json:plan_combined.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_COMMENT_SHA1: ${{ github.event.pull_request.head.sha }}
