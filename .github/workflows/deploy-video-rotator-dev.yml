name: Deploy Video Rotator Dev

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy to the dev Pages project
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.git_ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: apps/video-rotator
        run: npm ci

      - name: Build
        working-directory: apps/video-rotator
        run: npm run build

      - name: Deploy to Cloudflare Pages dev
        working-directory: apps/video-rotator
        run: npx wrangler pages deploy dist --project-name boxp-video-rotator-dev --branch dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
