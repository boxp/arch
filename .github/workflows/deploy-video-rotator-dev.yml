name: Deploy Video Rotator Dev

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy to the dev Pages project
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.git_ref }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: apps/video-rotator
        run: npm ci

      - name: Build
        working-directory: apps/video-rotator
        run: npm run build

      - name: Deploy to Cloudflare Pages dev
        working-directory: apps/video-rotator
        run: npx wrangler pages deploy dist --project-name boxp-video-rotator-dev --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
