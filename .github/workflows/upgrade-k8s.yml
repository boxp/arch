name: Kubernetes Upgrade

on:
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: 'Target Kubernetes version (e.g., 1.36.1)'
        required: true
      kubernetes_package:
        description: 'Target package version (e.g., 1.36.1-1.1)'
        required: true
      crio_version:
        description: 'Target CRI-O version (e.g., 1.36.1)'
        required: true
      dry_run:
        description: 'Dry run mode (--check)'
        type: boolean
        default: true
      target_node:
        description: 'Upgrade only the specified node. Run this workflow one node at a time'
        type: choice
        default: shanghai-1
        options:
          - shanghai-1
          - shanghai-2
          - shanghai-3
          - golyat-1
          - golyat-2
          - golyat-3
          - golyat-4

env:
  NODE_IPS: '{"shanghai-1":"192.168.10.102","shanghai-2":"192.168.10.103","shanghai-3":"192.168.10.104","golyat-1":"192.168.10.101","golyat-2":"192.168.10.105","golyat-3":"192.168.10.106","golyat-4":"192.168.10.107"}'
  ALL_NODE_IPS: "192.168.10.102 192.168.10.103 192.168.10.104 192.168.10.101 192.168.10.105 192.168.10.106 192.168.10.107"

jobs:
  pre-check:
    name: Pre-upgrade Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    env:
      K8S_VERSION: ${{ inputs.kubernetes_version }}
      K8S_PACKAGE: ${{ inputs.kubernetes_package }}
      CRIO_VERSION: ${{ inputs.crio_version }}
    steps:
      - name: Validate per-node execution
        run: |
          if [ "${{ inputs.target_node }}" = "all" ]; then
            echo "::error::target_node=all is disabled. Run this workflow once per node and verify cluster health before continuing."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::839695154978:role/GitHubActions_Ansible_Apply
          aws-region: ap-northeast-1

      - name: Setup Cloudflare credentials
        id: cf-credentials
        run: |
          CF_ID=""
          for i in 1 2 3; do
            CF_ID=$(aws ssm get-parameter --name "bastion-cf-access-client-id" --with-decryption --query "Parameter.Value" --output text) && break
            echo "Retry $i: Failed to get CF_ACCESS_CLIENT_ID"
            sleep 5
          done
          if [ -z "$CF_ID" ]; then
            echo "::error::Failed to retrieve CF_ACCESS_CLIENT_ID after 3 attempts"
            exit 1
          fi

          CF_SECRET=""
          for i in 1 2 3; do
            CF_SECRET=$(aws ssm get-parameter --name "bastion-cf-access-client-secret" --with-decryption --query "Parameter.Value" --output text) && break
            echo "Retry $i: Failed to get CF_ACCESS_CLIENT_SECRET"
            sleep 5
          done
          if [ -z "$CF_SECRET" ]; then
            echo "::error::Failed to retrieve CF_ACCESS_CLIENT_SECRET after 3 attempts"
            exit 1
          fi

          echo "::add-mask::$CF_ID"
          echo "::add-mask::$CF_SECRET"
          echo "CF_ACCESS_CLIENT_ID=$CF_ID" >> "$GITHUB_ENV"
          echo "CF_ACCESS_CLIENT_SECRET=$CF_SECRET" >> "$GITHUB_ENV"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.2
          working_directory: aqua

      - name: Setup SSH config
        run: |
          cat >> ~/.ssh/config << EOF
          Host bastion
            HostName bastion.b0xp.io
            User ansible
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h --header "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
            StrictHostKeyChecking accept-new
          EOF

          for NODE_IP in $ALL_NODE_IPS; do
            cat >> ~/.ssh/config << EOF

          Host ${NODE_IP}
            HostName ${NODE_IP}
            User boxp
            IdentityFile ~/.ssh/id_ed25519
            ProxyJump bastion
            StrictHostKeyChecking accept-new
          EOF
          done

          chmod 600 ~/.ssh/config

      - name: Verify SSH connectivity
        run: |
          echo "::group::SSH connectivity check"
          FAILED=0
          for NODE_IP in $ALL_NODE_IPS; do
            echo "Testing SSH to ${NODE_IP} via bastion..."
            if ssh -o ConnectTimeout=30 -o BatchMode=yes "${NODE_IP}" "hostname" 2>&1; then
              echo "::notice::SSH OK: ${NODE_IP}"
            else
              echo "::error::SSH FAILED: ${NODE_IP}"
              FAILED=1
            fi
          done
          echo "::endgroup::"
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more nodes are unreachable via SSH. Check bastion/Cloudflare tunnel and SSH keys."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        run: |
          cd ansible
          uv sync

      - name: Run pre-upgrade checks
        shell: bash
        run: |
          set -eo pipefail
          cd ansible
          source .venv/bin/activate
          echo "Running pre-upgrade checks with K8S_VERSION=${K8S_VERSION}"
          ansible-playbook \
            -i inventories/production/hosts.yml \
            playbooks/upgrade-k8s.yml \
            --tags pre_checks \
            -e "ansible_ssh_common_args=''" \
            -e "kubernetes_upgrade_version=${K8S_VERSION}" \
            -e "kubernetes_upgrade_package=${K8S_PACKAGE}" \
            -e "crio_upgrade_version=${CRIO_VERSION}" \
            -vv 2>&1 | tee /tmp/pre-check-ansible.log

      - name: Take etcd snapshot
        if: inputs.dry_run == false
        shell: bash
        run: |
          set -eo pipefail
          cd ansible
          source .venv/bin/activate
          echo "Taking etcd snapshot before production upgrade and storing it in the Longhorn PVC"
          ansible-playbook \
            -i inventories/production/hosts.yml \
            playbooks/upgrade-k8s.yml \
            --tags etcd_snapshot \
            -e "ansible_ssh_common_args=''" \
            -e "kubernetes_upgrade_version=${K8S_VERSION}" \
            -e "kubernetes_upgrade_package=${K8S_PACKAGE}" \
            -e "crio_upgrade_version=${CRIO_VERSION}" \
            -vv 2>&1 | tee /tmp/etcd-snapshot-ansible.log

      - name: Upload pre-check logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pre-check-ansible-log
          path: |
            /tmp/pre-check-ansible.log
            /tmp/etcd-snapshot-ansible.log
          retention-days: 14

