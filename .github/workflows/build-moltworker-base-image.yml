name: Build Moltworker Base Image

on:
  push:
    branches: [main]
    paths: ['docker/moltworker/UPSTREAM_REF']
  pull_request:
    paths: ['docker/moltworker/UPSTREAM_REF']
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read and validate upstream ref
        id: upstream
        run: |
          ref="$(tr -d '[:space:]' < docker/moltworker/UPSTREAM_REF)"
          if ! echo "$ref" | grep -qE '^[0-9a-f]{40}$'; then
            echo "ERROR: UPSTREAM_REF must be a 40-char hex SHA, got: $ref" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Clone upstream at pinned ref
        env:
          UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: |
          git clone --no-checkout https://github.com/cloudflare/moltworker.git /tmp/moltworker
          cd /tmp/moltworker && git checkout "$UPSTREAM_REF"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/boxp/arch/moltworker-base
          tags: |
            type=raw,value={{date 'YYYYMMDDHHmm'}},enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: /tmp/moltworker
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
