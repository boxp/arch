name: Build Moltworker Base Image

on:
  push:
    branches: [main]
    paths: ['docker/moltworker/UPSTREAM_REF']
  pull_request:
    paths: ['docker/moltworker/UPSTREAM_REF']
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read and validate upstream ref
        id: upstream
        run: |
          ref="$(tr -d '[:space:]' < docker/moltworker/UPSTREAM_REF)"
          if ! echo "$ref" | grep -qE '^[0-9a-f]{40}$'; then
            echo "ERROR: UPSTREAM_REF must be a 40-char hex SHA, got: $ref" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Clone upstream at pinned ref
        env:
          UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: |
          git clone --no-checkout https://github.com/cloudflare/moltworker.git /tmp/moltworker
          cd /tmp/moltworker && git checkout "$UPSTREAM_REF"

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/boxp/arch/moltworker-base
          tags: |
            type=raw,value={{date 'YYYYMMDDHHmm'}},enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: /tmp/moltworker
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
