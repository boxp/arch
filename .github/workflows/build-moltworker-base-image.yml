name: Build Moltworker Base Image

on:
  push:
    branches: [main]
    paths: ['docker/moltworker/UPSTREAM_REF']
  pull_request:
    paths: ['docker/moltworker/UPSTREAM_REF']
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Read and validate upstream ref
        id: upstream
        run: |
          ref="$(tr -d '[:space:]' < docker/moltworker/UPSTREAM_REF)"
          if ! echo "$ref" | grep -qE '^[0-9a-f]{40}$'; then
            echo "ERROR: UPSTREAM_REF must be a 40-char hex SHA, got: $ref" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Clone upstream at pinned ref
        env:
          UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
        run: |
          git clone --no-checkout https://github.com/cloudflare/moltworker.git /tmp/moltworker
          cd /tmp/moltworker && git checkout "$UPSTREAM_REF"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/boxp/arch/moltworker-base
          tags: |
            type=raw,value={{date 'YYYYMMDDHHmm'}},enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: /tmp/moltworker
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
