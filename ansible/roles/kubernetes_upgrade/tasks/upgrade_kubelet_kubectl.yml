---
- name: Unhold kubelet
  ansible.builtin.dpkg_selections:
    name: kubelet
    selection: install
  become: true
  when: not ansible_check_mode
  tags: [upgrade]

- name: Unhold kubectl
  ansible.builtin.dpkg_selections:
    name: kubectl
    selection: install
  become: true
  when: not ansible_check_mode
  tags: [upgrade]

- name: Install target kubelet version
  ansible.builtin.apt:
    name: "kubelet={{ kubernetes_upgrade_package }}"
    state: present
    allow_downgrade: false
  become: true
  when: not ansible_check_mode
  tags: [upgrade]

- name: Install target kubectl version
  ansible.builtin.apt:
    name: "kubectl={{ kubernetes_upgrade_package }}"
    state: present
    allow_downgrade: false
  become: true
  when: not ansible_check_mode
  tags: [upgrade]

- name: Hold kubelet
  ansible.builtin.dpkg_selections:
    name: kubelet
    selection: hold
  become: true
  when: not ansible_check_mode
  tags: [upgrade]

- name: Hold kubectl
  ansible.builtin.dpkg_selections:
    name: kubectl
    selection: hold
  become: true
  when: not ansible_check_mode
  tags: [upgrade]
