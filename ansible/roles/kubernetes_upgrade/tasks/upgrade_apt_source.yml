---
- name: Configure Kubernetes apt repository for target version
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: "deb https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_upgrade_version.split('.')[:2] | join('.') }}/deb/ /\n"
    mode: '0644'
  become: true
  tags: [upgrade]

- name: Configure CRI-O apt repository for target version
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/crio.list
    content: "deb https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v{{ crio_upgrade_version.split('.')[:2] | join('.') }}/deb/ /\n"
    mode: '0644'
  become: true
  when: crio_upgrade_version is defined and crio_upgrade_version != ""
  tags: [upgrade]

- name: Remove duplicate CRI-O version-specific apt repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/crio-version.list
    state: absent
  become: true
  when: crio_upgrade_version is defined and crio_upgrade_version != ""
  tags: [upgrade]

- name: Import Kubernetes apt repository GPG key for target version
  ansible.builtin.apt_key:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_upgrade_version.split('.')[:2] | join('.') }}/deb/Release.key"
    state: present
  become: true
  tags: [upgrade]

- name: Import CRI-O apt repository GPG key for target version
  ansible.builtin.apt_key:
    url: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v{{ crio_upgrade_version.split('.')[:2] | join('.') }}/deb/Release.key"
    state: present
  become: true
  when: crio_upgrade_version is defined and crio_upgrade_version != ""
  tags: [upgrade]

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  become: true
  tags: [upgrade]

- name: Upgrade CRI-O
  ansible.builtin.apt:
    name: "cri-o={{ crio_upgrade_version }}*"
    state: present
    update_cache: false
  become: true
  when:
    - crio_upgrade_version is defined and crio_upgrade_version != ""
    - not ansible_check_mode
  notify: Restart crio
  tags: [upgrade]
