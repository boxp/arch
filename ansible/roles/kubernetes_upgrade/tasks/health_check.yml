---
- name: Wait for node to be Ready
  ansible.builtin.command: >
    kubectl --kubeconfig={{ kubeconfig_path }} {{ kubectl_api_server_arg }} get node {{ inventory_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: node_ready
  check_mode: false
  until: node_ready.stdout == "True"
  retries: "{{ upgrade_health_check_retries }}"
  delay: "{{ upgrade_health_check_delay }}"
  changed_when: false
  become: true
  tags: [health_check]

- name: Verify kubelet version on node
  ansible.builtin.command: >
    kubectl --kubeconfig={{ kubeconfig_path }} {{ kubectl_api_server_arg }} get node {{ inventory_hostname }}
    -o jsonpath='{.status.nodeInfo.kubeletVersion}'
  register: node_kubelet_version
  check_mode: false
  changed_when: false
  failed_when:
    - not ansible_check_mode
    - kubernetes_upgrade_version not in node_kubelet_version.stdout
  become: true
  tags: [health_check]

- name: Verify node conditions (no pressure)
  ansible.builtin.command: >
    kubectl --kubeconfig={{ kubeconfig_path }} {{ kubectl_api_server_arg }} get node {{ inventory_hostname }}
    -o jsonpath='{range .status.conditions[*]}{.type}={.status}{"\n"}{end}'
  register: node_conditions
  check_mode: false
  changed_when: false
  failed_when: >
    'MemoryPressure=True' in node_conditions.stdout or
    'DiskPressure=True' in node_conditions.stdout or
    'PIDPressure=True' in node_conditions.stdout
  become: true
  tags: [health_check]

- name: Verify etcd cluster health (control plane only)
  ansible.builtin.command:
    argv:
      - kubectl
      - "--kubeconfig={{ kubeconfig_path }}"
      - "{{ kubectl_api_server_arg }}"
      - -n
      - kube-system
      - exec
      - "etcd-{{ inventory_hostname }}"
      - --
      - etcdctl
      - endpoint
      - health
      - "--endpoints=https://127.0.0.1:2379"
      - "--cacert={{ etcd_cacert }}"
      - "--cert={{ etcd_cert }}"
      - "--key={{ etcd_key }}"
  check_mode: false
  changed_when: false
  become: true
  when: node_role == "control_plane"
  tags: [health_check]
