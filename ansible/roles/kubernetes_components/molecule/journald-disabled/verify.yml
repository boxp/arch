---
- name: Verify journald disabled path
  hosts: all
  gather_facts: false
  tasks:
    - name: Read journald drop-in
      ansible.builtin.slurp:
        src: /etc/systemd/journald.conf.d/10-persistent-storage.conf
      register: journald_dropin

    - name: Assert Storage=volatile is set when persistent storage is disabled
      ansible.builtin.assert:
        that:
          - "'Storage=volatile' in (journald_dropin.content | b64decode)"
        fail_msg: >-
          Storage=volatile must be set in drop-in when journald_persistent_storage
          is false, but found: {{ journald_dropin.content | b64decode }}
