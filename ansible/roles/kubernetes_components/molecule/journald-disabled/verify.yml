---
- name: Verify journald disabled path
  hosts: all
  gather_facts: false
  tasks:
    - name: Check if journald drop-in exists
      ansible.builtin.stat:
        path: /etc/systemd/journald.conf.d/10-persistent-storage.conf
      register: journald_dropin

    - name: Assert journald persistent-storage drop-in is absent
      ansible.builtin.assert:
        that:
          - not journald_dropin.stat.exists
        fail_msg: >-
          journald persistent-storage drop-in must not exist when
          journald_persistent_storage is false, but found
          /etc/systemd/journald.conf.d/10-persistent-storage.conf
