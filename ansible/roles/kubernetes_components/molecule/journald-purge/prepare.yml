---
- name: Prepare environment for journald purge scenario
  hosts: all
  gather_facts: true
  tasks:
    - name: Update package cache
      ansible.builtin.package:
        update_cache: true
      become: true

    - name: Install required packages
      ansible.builtin.package:
        name:
          - systemd
          - dbus
          - init
          - iproute2
          - kmod
          - procps
          - curl
          - gnupg
          - ca-certificates
        state: present
      become: true

    - name: Create kernel modules directory
      ansible.builtin.file:
        path: /lib/modules
        state: directory
        mode: '0755'
      become: true

    - name: Ensure systemd is running
      ansible.builtin.systemd:
        name: systemd-logind
        state: started
      become: true
      failed_when: false

    - name: Create SSH host keys
      ansible.builtin.command: ssh-keygen -A
      become: true
      changed_when: false
      failed_when: false

    - name: Create mock kernel modules for testing
      ansible.builtin.shell: |
        set -o pipefail
        mkdir -p /lib/modules/$(uname -r)
        touch /lib/modules/$(uname -r)/modules.dep
        touch /lib/modules/$(uname -r)/modules.symbols
      become: true
      changed_when: false
      failed_when: false

    - name: Mock modprobe for container environment
      ansible.builtin.copy:
        dest: /usr/local/bin/modprobe
        content: |
          #!/bin/bash
          # Mock modprobe for container testing
          echo "Mock modprobe: $*"
          exit 0
        mode: '0755'
      become: true

    - name: Ensure journald drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        mode: '0755'
      become: true

    - name: Pre-create role-managed journald drop-in (simulates prior persistent-enable run)
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/10-persistent-storage.conf
        mode: '0644'
        content: |
          [Journal]
          Storage=persistent
          SystemMaxUse=200M
          MaxRetentionSec=1month
      become: true

    - name: Pre-create /var/log/journal directory (simulates existing persistent journal)
      ansible.builtin.file:
        path: /var/log/journal
        state: directory
        mode: '2755'
      become: true

    - name: Pre-create sentinel file inside /var/log/journal
      ansible.builtin.copy:
        dest: /var/log/journal/existing-log.journal
        content: "sentinel"
        mode: '0644'
      become: true
