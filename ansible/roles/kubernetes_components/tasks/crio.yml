---
# CRI-O installation and configuration tasks

- name: Install dependencies for CRI-O
  ansible.builtin.package:
    name:
      - curl
      - gnupg
      - software-properties-common
      - apt-transport-https
      - ca-certificates
    state: present
  become: true

- name: Add CRI-O repository key
  ansible.builtin.apt_key:
    url: "{{ crio_apt_key_url }}"
    state: present
  become: true

- name: Add CRI-O version-specific repository key
  ansible.builtin.apt_key:
    url: "{{ crio_version_apt_key_url }}"
    state: present
  become: true

- name: Add CRI-O repository
  ansible.builtin.apt_repository:
    repo: "deb {{ crio_apt_repository }} /"
    state: present
    filename: crio
    update_cache: true
  become: true

- name: Add CRI-O version-specific repository
  ansible.builtin.apt_repository:
    repo: "deb {{ crio_version_apt_repository }} /"
    state: present
    filename: crio-version
    update_cache: true
  become: true

- name: Set CRI-O package spec
  ansible.builtin.set_fact:
    crio_package_spec: "{{ 'cri-o=' ~ crio_package_version if (crio_package_version | default('')) | length > 0 else 'cri-o' }}"

- name: Install CRI-O package
  ansible.builtin.apt:
    name: "{{ crio_package_spec }}"
    state: present
    update_cache: true
    allow_change_held_packages: true
    allow_downgrade: false
  become: true
  notify: Restart crio

- name: Hold CRI-O package to prevent automatic updates
  ansible.builtin.dpkg_selections:
    name: cri-o
    selection: hold
  become: true
  when: (crio_package_version | default('')) | length > 0

- name: Create CRI-O configuration directory
  ansible.builtin.file:
    path: /etc/crio/crio.conf.d
    state: directory
    mode: '0755'
  become: true

- name: Create containers registries configuration directory
  ansible.builtin.file:
    path: /etc/containers/registries.conf.d
    state: directory
    mode: '0755'
  become: true

- name: Configure containers short-name mode
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf.d/99-short-name-mode.conf
    content: |
      short-name-mode = "permissive"
    mode: '0644'
  become: true
  notify: Restart crio

- name: Configure CRI-O for systemd cgroup driver
  ansible.builtin.copy:
    dest: /etc/crio/crio.conf.d/02-cgroup-manager.conf
    content: |
      [crio.runtime]
      conmon_cgroup = "pod"
      cgroup_manager = "systemd"
    mode: '0644'
  become: true
  notify: Restart crio

- name: Configure CRI-O container log size limit
  ansible.builtin.copy:
    dest: /etc/crio/crio.conf.d/99-log-rotation.conf
    content: |
      [crio.runtime]
      log_size_max = {{ crio_log_size_max }}
    mode: '0644'
  become: true
  notify: Restart crio

- name: Create systemd multi-user.target.wants directory
  ansible.builtin.file:
    path: /etc/systemd/system/multi-user.target.wants
    state: directory
    mode: '0755'
  become: true

- name: Enable CRI-O service via symlink
  ansible.builtin.file:
    src: /usr/lib/systemd/system/crio.service
    dest: /etc/systemd/system/multi-user.target.wants/crio.service
    state: link
  become: true
  when: not ansible_virtualization_type == "docker"
