---
# Kubernetes installation tasks

- name: Add Kubernetes repository key
  ansible.builtin.apt_key:
    url: "{{ kubernetes_apt_key_url }}"
    state: present
  become: true

- name: Configure Kubernetes repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: "deb {{ kubernetes_apt_repository }} /\n"
    mode: '0644'
  become: true

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name: "{{ kubernetes_packages }}"
    state: present
    update_cache: true
    allow_downgrade: true
  become: true
  notify: Restart kubelet

- name: Hold Kubernetes packages to prevent automatic updates
  ansible.builtin.dpkg_selections:
    name: "{{ item.split('=')[0] }}"
    selection: hold
  become: true
  loop: "{{ kubernetes_packages }}"

- name: Create kubelet configuration directory
  ansible.builtin.file:
    path: /etc/kubernetes
    state: directory
    mode: '0755'
  become: true

- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    daemon_reload: true
  become: true
  when: not ansible_virtualization_type == "docker"
