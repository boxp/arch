---
all:
  children:
    control_plane:
      hosts:
        shanghai-1:
          ansible_host: 192.168.10.102
          node_ip: 192.168.10.102
        shanghai-2:
          ansible_host: 192.168.10.103
          node_ip: 192.168.10.103
        shanghai-3:
          ansible_host: 192.168.10.104
          node_ip: 192.168.10.104
      vars:
        ansible_user: boxp
        ansible_ssh_common_args: '-o ProxyCommand="cloudflared access ssh --hostname %h"'
        ansible_python_interpreter: /usr/bin/python3

        # Kubernetes configuration
        kubernetes_version: "1.36.1"
        kubernetes_package_version: "1.36.1-1.1"
        crio_version: "1.36.1"

        # Cluster configuration
        cluster_vip: "192.168.10.99"
        cluster_domain: "cluster.local"
        cluster_dns: "10.96.0.10"

        # Hardware configuration
        hardware_type: "orange_pi_zero3"
        architecture: "arm64"
        # Network configuration
        network_gateway: "192.168.10.1"
        network_dns_servers:
          - "8.8.8.8"
          - "8.8.4.4"
    # Oracle Cloud Free Tier ARM64 control plane nodes.
    # ansible_host will be set to the Tailscale IP after `terraform apply`.
    # Run `terraform output` in terraform/oci/lolice-control-plane to get Tailscale IPs,
    # then update the placeholder values below.
    cloud_control_plane:
      hosts:
        oracle-cp-1:
          ansible_host: "TAILSCALE_IP_PLACEHOLDER_1"
          node_ip: "TAILSCALE_IP_PLACEHOLDER_1"
        oracle-cp-2:
          ansible_host: "TAILSCALE_IP_PLACEHOLDER_2"
          node_ip: "TAILSCALE_IP_PLACEHOLDER_2"
      vars:
        ansible_user: ubuntu
        ansible_python_interpreter: /usr/bin/python3

        # Kubernetes configuration (match latest node in cluster)
        kubernetes_version: "1.36.2"
        kubernetes_package_version: "1.36.2-1.1"
        crio_version: "1.36.2"

        # Cluster configuration
        cluster_vip: "192.168.10.99"
        cluster_domain: "cluster.local"
        cluster_dns: "10.96.0.10"

        # Hardware configuration
        hardware_type: "oracle_cloud_ampere_a1"
        architecture: "arm64"
        is_cloud_control_plane: true

        # kube-vip is not used on cloud CPs (L2 VIP is LAN-only)
        kube_vip_enabled: false

    workers:
      hosts:
        golyat-1:
          ansible_host: 192.168.10.101
          node_ip: 192.168.10.101
        golyat-2:
          ansible_host: 192.168.10.105
          node_ip: 192.168.10.105
        golyat-3:
          ansible_host: 192.168.10.106
          node_ip: 192.168.10.106
        golyat-4:
          ansible_host: 192.168.10.107
          node_ip: 192.168.10.107
          hardware_type: "gmktec_evo_t1"
          architecture: "amd64"
          gpu_worker: true
      vars:
        ansible_user: boxp
        ansible_ssh_common_args: '-o ProxyCommand="cloudflared access ssh --hostname %h"'
        ansible_python_interpreter: /usr/bin/python3

        # Kubernetes configuration
        kubernetes_version: "1.36.1"
        kubernetes_package_version: "1.36.1-1.1"
        crio_version: "1.36.1"

        # Cluster configuration
        cluster_vip: "192.168.10.99"
        cluster_domain: "cluster.local"
        cluster_dns: "10.96.0.10"

        # Hardware configuration
        hardware_type: "orange_pi_zero3"
        architecture: "arm64"
        # Network configuration
        network_gateway: "192.168.10.1"
        network_dns_servers:
          - "8.8.8.8"
          - "8.8.4.4"
